        Text: "Your ticket will still be created • Thank you for your patience"
        Icon: "https://i.imgur.com/w5XxKpc.png"
      Color: "#FFA500"
      Image: "https://i.imgur.com/LbjDuZ8.png"
      Thumbnail: "https://i.imgur.com/1FGL7XO.png"

  CloseReasons:
    Enabled: true
    DefaultReason: "Không lí do cụ thể."
    Reasons:
      - name: "Đã hoàn thành"
        emoji: "✅"
        value: "resolved"
      - name: "User Request"
        emoji: "👋"
        value: "user_request"
      - name: "Không hoạt động"
        emoji: "⏰"
        value: "inactive"
      - name: "Không tồn tại"
        emoji: "❌"
        value: "invalid"
    AllowCustomReason: true

Priority:

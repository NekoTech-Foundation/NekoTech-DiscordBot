              - "🔍 **Trigger:** {threshold}"
              - "🚫 **Amount:** {threshold_amount}"
              - "**📅 Date:** {timestamp}"
            Color: "#1769FF"
            Footer: "Anti Nuke | NekoBuckets"
            Thumbnail: true
            LogsChannelID: "CHANNEL_ID"

        # Supports unlimited tiers


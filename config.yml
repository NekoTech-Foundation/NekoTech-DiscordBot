            Color: "#1769FF"
            Footer: "Anti Nuke | NekoBuckets"
            Thumbnail: true
            LogsChannelID: "CHANNEL_ID" # Set to "" to disable

      Tier2: # Second tier with stricter thresholds and actions - Continues from Tier 1

# ===========================================================================
# TICKET SYSTEM
# ===========================================================================
TicketSettings:
  Enabled: false
  LogsChannelID: "CHANNEL_ID"
  MaxTickets: 1
  DeletionTime: "0"
  useSelectMenu: true
  overFlow: ["CATEGORY_ID", "CATEGORY_ID"] # Tickets will be moved to this category if the main category is full (Left to right)

  DelayedResponse:
    Enabled: false
    TicketThreshold: 25 # Send warning when there are this many open tickets
    Embed:
      Title: ""
      Description:
        - "# 🎫 High Support Volume Notice"
        - ""
        - "⚠️ We are currently experiencing higher than usual ticket volume."
        - ""
        - "## Current Status"
        - "> 📊 **Active Tickets:** {openTickets}"
        - "> ⏱️ **Est. Response Time:** 24-48 hours"
        - "> 🔄 **Status:** Processing tickets in order received"
        - ""
        - "## Need Immediate Help?"
        - "• Review our [Documentation](https://docs.drakodevelopment.net)"
        - "• Join our [Community](https://discord.gg/drakobot)"
      Footer:
        Text: "Your ticket will still be created • Thank you for your patience"
        Icon: "https://i.imgur.com/w5XxKpc.png"
      Color: "#FFA500"
      Image: "https://i.imgur.com/LbjDuZ8.png"
      Thumbnail: "https://i.imgur.com/1FGL7XO.png"

  CloseReasons:
    Enabled: true
    DefaultReason: "No reason provided"
    Reasons:
      - name: "Issue Resolved"
        emoji: "✅"
        value: "resolved"
      - name: "User Request"
        emoji: "👋"
        value: "user_request"
      - name: "Inactive"
        emoji: "⏰"
        value: "inactive"
      - name: "Invalid"
        emoji: "❌"
        value: "invalid"
    AllowCustomReason: true

Priority:
  Enabled: true 
  DefaultPriority: "Low"

  Levels:
    Low:
      Roles: ["ROLE_ID", "ROLE_ID"] # Roles assigned this priority
      Tag: ["ROLE_ID", "ROLE_ID"] # Roles to tag when a ticket is opened by this priority
      MoveTop: false # Should their ticket be moved to the top of the category?

    Medium:
      Roles: ["ROLE_ID", "ROLE_ID"] # Roles assigned this priority
      Tag: ["ROLE_ID", "ROLE_ID"] # Roles to tag when a ticket is opened by this priority
      MoveTop: true # Should their ticket be moved to the top of the category?

    High:
      Roles: ["ROLE_ID", "ROLE_ID"] # Roles assigned this priority
      Tag: ["ROLE_ID", "ROLE_ID"] # Roles to tag when a ticket is opened by this priority
      MoveTop: true # Should their ticket be moved to the top of the category?

WorkingHours:
  Enabled: false
  Timezone: "Europe/London" # https://gist.github.com/diogocapela/12c6617fc87607d11fd62d2a4f42b02a

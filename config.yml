# ===========================================================================
# CÁC TÍNH NĂNG KHÁC
# ===========================================================================

# Hệ thống AI (Gemini)
AI:
  Gemini:
    Model: "gemini-2.5-flash"
    Enabled: false

# Hệ thống Cấp độ (Leveling)
LevelingSystem:
  Enabled: true
  XPNeeded: 150
  MessageXP: "10-20"
  VoiceXP: "1-3"
  CooldownSettings:
    EnableXPCooldown: true
    XPCooldown: "1s"
    VoiceInterval: "10s"
  LevelUpMessageSettings:
    UseEmbed: true
    LevelUpMessage: "Ting! {user} đã lên cấp {newLevel}!"

# Reaction Roles
ReactionRoles:
  Enabled: false

# Verification System
VerificationSettings:
  Enabled: true
  ChannelID: "CHANNEL_ID"
  VerifiedRoleID: ["ROLE_ID"]
  EnableUnverifiedRole: false
  VerificationType: "BUTTON" # BUTTON, CAPTCHA, CALCULATOR
  VerificationButton:
    Name: "Verify Here"
    Emoji: "✅"
    Color: "SUCCESS" # PRIMARY, SECONDARY, SUCCESS, DANGER
  VerificationEmbed:
    Title: "Server Verification"
    Description: "Please verify yourself to gain access to the server."
    Image: ""

# Custom Commands
CommandsEnabled: true
CommandsPrefix: "K"

# ===========================================================================
# ECONOMY & STORE
# ===========================================================================
Economy:
  defaultInterestRate: 0.01
  maxInterestEarning: 5000
  interestInterval: ["00:00"]

  Beg:
    cooldown: "30s"
    min: 10
    max: 50

Store:
  Categories: []
  Phân bón:
    growth_fertilizer:
      Name: "Growth Fertilizer"
      Key: "growth_fertilizer"

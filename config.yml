    Wednesday: "16:00-22:00"
    Thursday: "16:00-22:00"
    Friday: "16:00-22:00"
    Saturday: "16:00-22:00"
    Sunday: "16:00-22:00"
  allowOpenTickets: true # Should people be able to open tickets during the off hours? 


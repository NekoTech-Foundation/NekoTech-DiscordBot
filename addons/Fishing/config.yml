# Configuration for the Fishing Addon

# -- Rods --
# key: The unique identifier for the rod.
# name: The display name of the rod.
# price: The cost to buy the rod in the shop.
# durability: The maximum durability of the rod.
rods:
  tap_su:
    name: "Cần câu tập sự"
    price: 350
    durability: 100
  ban_chuyen:
    name: "Cần câu bán chuyên"
    price: 2500
    durability: 600
  chuyen_nghiep:
    name: "Cần câu chuyên nghiệp"
    price: 10500
    durability: 5000

# -- Baits --
# key: The unique identifier for the bait.
# name: The display name of the bait.
# price: The cost to buy the bait in the shop.
# bonus: A range [min, max] for the percentage boost to catch rates.
# attracts: A list of rarities this bait is more likely to attract.
baits:
  giun:
    name: "Mồi câu giun"
    price: 50
    bonus: [0.025, 0.05] # 2.5% to 5%
    attracts: ["common", "uncommon"]
  xa:
    name: "Mồi câu xả"
    price: 200
    bonus: [0.05, 0.10] # 5% to 10%
    attracts: ["rare", "epic"]
  dac_biet:
    name: "Mồi câu đặc biệt"
    price: 800
    bonus: [0.10, 0.15] # 10% to 15%
    attracts: ["epic", "legendary"]

# -- General Settings --
repair_cost_multiplier: 0.5 # 50% of original price
repair_durability_threshold: 0.3 # Can only repair below 30% durability
rarity_chances:
  common: 0.41
  uncommon: 0.305
  rare: 0.2045
  epic: 0.07
  legendary: 0.0105

# -- Economy --
# Price per KG when selling fish.
rarity_prices_per_kg:
  common: 1
  uncommon: 5
  rare: 20
  epic: 100
  legendary: 500


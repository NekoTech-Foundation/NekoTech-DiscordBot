# ===========================================================================
# DAILY MEME CONFIGURATION
# ===========================================================================
memeChannelId: "1427637347444592691"  # Channel where memes will be posted

# ===========================================================================
# FEATURES CONFIGURATION
# ===========================================================================
features:
  debug: false          # Enable debug logging
  postTime: "12:00"     # Time to post meme (24-hour format)
  timezone: "Asia/Ho_Chi_Minh"       # Timezone for post time
  autoReact:
    enabled: true      # Enable/disable auto reactions
    reactions:         # List of reactions to add (in order)
      - "😂"          # Default laughing emoji
      - "👍"          # Thumbs up
      - "❤️"          # Heart

# ===========================================================================
# EMBED CONFIGURATION
# ===========================================================================
embed:
  color: "#FF4500"      
  footer: "🎭 Daily Meme"
  showStats: true       # Show upvotes and comments in embed

# ===========================================================================
# API CONFIGURATION
# ===========================================================================
api:
  endpoint: "https://meme-api.com/gimme"
  subreddits:            # List of subreddits to fetch from (random if multiple)
    - "memes"
    - "dankmemes"
    - "wholesomememes"
  nsfw: true           # Whether to allow NSFW memes 
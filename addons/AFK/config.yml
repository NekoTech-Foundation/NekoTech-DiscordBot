enabled: true

# ===========================================
#  General Settings
# ===========================================
settings:
  # Roles that can use the AFK command (empty = everyone)
  allowed_roles: [] # ["ROLE_ID", "ROLE_ID"]
  notification_channel: ""
  mention_notifications: true
  default_color: "#FF6B6B"
  default_thumbnail: ""

# ===========================================
#  Message Templates
# ===========================================
messages:
  # When someone mentions an AFK user
  mention:
    type: "embed"  # embed or text
    text: "{username} Hiện đang Bận, Lí do: {reason}"
    embed:
      color: "#FF6B6B"
      title: "💤 {username} đang AFK"
      description: |
        **📝 Lí do:** {reason}
        **🔙 Quay lại sau:** {return_time}
        **⏰ AFK từ:** {timestamp}
      footer:
        text: "Họ sẽ nhận được tin nhắn của bạn khi quay lại"
        icon: "{user_avatar}"
      thumbnail: "{user_avatar}"
  
  # When someone goes AFK
  afk_enabled:
    type: "embed"  # embed or text
    text: "💤 {username} đang AFK: {reason}"
    embed:
      color: "#FF6B6B"
      title: "⌛ Trạng Thái Treo Máy (Bật)"
      description: |
        **👤 Người dùng:** {username}
        **📝 Lí do:** {reason}
        **🔙 Quay lại sau:** {return_time}
        **⏰ AFK từ:** {timestamp}
      footer:
        text: "Sử dụng lệnh /afk để đặt trạng thái AFK"
        icon: "{user_avatar}"
      thumbnail: "{user_avatar}"

  # When someone returns from AFK
  afk_disabled:
    type: "embed"  # embed or text
    text: "👋 Chào mừng trở lại {username}! Bạn đã AFK khoảng {duration}"
    embed:
      color: "#4CAF50"
      title: "👋 Chào Mừng Trở Lại!"
      description: |
        **👤 Người dùng:** {username}
        **⏱️ Thời gian AFK:** {duration}
        **📝 Lí do:** {reason}
        **🕐 Giai đoạn:** {timestamp} → Bây giờ
      footer:
        text: "Trạng thái AFK đã được xóa"
        icon: "{user_avatar}"
      thumbnail: "{user_avatar}"

# ===========================================
#  Language Settings
# ===========================================
lang:
  errors:
    no_permission: "Bạn không có quyền sử dụng lệnh này"
    invalid_duration: "⚠️ Sai định dạng thời gian! Ví dụ: 1h, 30m, 1h 30m"
    already_afk: "Bạn đã đang ở trạng thái AFK rồi!"
    not_afk: "Bạn hiện không ở trạng thái AFK!"
  success:
    afk_enabled: "✅ Đã bật trạng thái AFK!"
    afk_disabled: "✅ Trạng thái AFK đã được xóa"

# ===========================================
#  Available Placeholders
# ===========================================
# {username}     - The user's Discord username
# {user_avatar}  - The user's Discord avatar URL
# {reason}       - The AFK reason
# {return_time}  - When the user will return (as Discord timestamp)
# {timestamp}    - When the user went AFK (as Discord timestamp)
# {duration}     - How long the user was AFK
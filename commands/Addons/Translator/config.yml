enabled: true

# Command settings
prefix: "/"
delete_command: true  # Toggle whether to delete the command message ONLY PREFIX COMMANDS

# Context menu settings
context_menu:
  enabled: true
  default_language: "vi"  # Default language if server language not detected

# Supported languages display format
language_format: "CODE"  # CODE = en, NAME = English

# Enable auto language detection 
allow_detection: true

# Message embeds
embed:
  enabled: true  # Master switch for embeds
  color: ""  # Leave empty for default color
  footer:
    enabled: true  # Toggle footer on/off
    text: "Google Dịch"  # Footer text (optional)
    icon: ""  # Footer icon URL (optional)
  author:
    enabled: true  # Toggle author on/off 
    text: ""  # Author name (optional)
    icon: ""  # Author icon URL (optional)
  timestamp: true  # Toggle timestamp on/off


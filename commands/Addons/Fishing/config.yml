# Configuration for the Fishing Addon

# -- Rods --
# key: The unique identifier for the rod.
# name: The display name of the rod.
# price: The cost to buy the rod in the shop.
# durability: The maximum durability of the rod.
# luck: The base luck of the rod (increases catch chance).
# effects: Special effects of the rod, such as boosting rarity chances.
# -- Baits --
# key: The unique identifier for the bait.
# name: The display name of the bait.
# price: The cost to buy the bait.
# luck: The added luck percentage.
# bonus: The range of bonus catch rate.
# attracts: The rarity of fish this bait attracts.
baits:
  # --- 🟢 CƠ BẢN (Basic) ---
  giun:
    name: "Mồi câu giun"
    price: 50
    luck: 0.03
    bonus: [0.02, 0.04]
    attracts: ["common", "uncommon"]
  com:
    name: "Mồi cơm"
    price: 100
    luck: 0.05
    bonus: [0.03, 0.06]
    attracts: ["common", "uncommon"]
  # --- 🔵 TRUNG CẤP (Mid) ---
  trung_kien:
    name: "Mồi trứng kiến"
    price: 250
    luck: 0.08
    bonus: [0.15, 0.30]
    attracts: ["uncommon", "rare"]
  go:
    name: "Mồi câu gỗ"
    price: 300
    luck: 0.10
    bonus: [0.20, 0.40]
    attracts: ["rare"]
  xa:
    name: "Mồi câu xả"
    price: 350
    luck: 0.10
    bonus: [0.20, 0.40]
    attracts: ["rare", "epic"]
  # --- 🟡 CAO CẤP (High) ---
  tom:
    name: "Mồi tôm"
    price: 600
    luck: 0.15
    bonus: [0.40, 0.70]
    attracts: ["rare", "epic"]
  chay:
    name: "Mồi câu chay"
    price: 800
    luck: 0.18
    bonus: [0.50, 0.80]
    attracts: ["epic", "legendary"]
  # --- 🔴 QUÝ HIẾM (Premium) ---
  dac_biet:
    name: "Mồi câu đặc biệt"
    price: 1200
    luck: 0.22
    bonus: [0.60, 1.0]
    attracts: ["epic", "legendary"]
  tong_hop:
    name: "Mồi câu tổng hợp"
    price: 1500
    luck: 0.25
    bonus: [0.80, 1.2]
    attracts: ["epic", "legendary"]
  thuoc_bac:
    name: "Mồi thuốc bắc"
    price: 2000
    luck: 0.30
    bonus: [1.5, 2.5]
    attracts: ["legendary"]


rods:
  # --- 🟢 STARTER ---
  tap_su:
    name: "Cần câu tập sự"
    price: 350
    durability: 100
    luck: 0.05
    pity:
      min_rarity: "uncommon"
      threshold: 15

compliments:
  messages:
    - Bạn hữu ích hơn bạn nghĩ nhiều.
    - Tài năng tử tế của bạn không ai sánh bằng.
    - Bạn có khiếu hài hước tuyệt vời.
    - Bạn làm nổi bật những điều tốt đẹp nhất ở người khác.
    - Góc nhìn của bạn thật mới mẻ.
    - Bạn thắp sáng cả căn phòng.
    - Bạn có gu thẩm mỹ tuyệt vời.
    - Lòng tốt của bạn là liều thuốc chữa lành cho tất cả những ai gặp bạn.
    - Bạn giống như một tia nắng trong một ngày thực sự u ám.
    - Bạn là một người thông minh.
    - Tôi cá là bạn giải ô chữ bằng bút mực.
    - Bạn là lý do khiến ai đó mỉm cười.
    - Bạn có những ý tưởng hay nhất.
    - Bạn luôn biết cách tìm thấy tia hy vọng.
    - Ai cũng có lúc gục ngã; chỉ những người như bạn mới đứng dậy và tiếp tục bước đi.
    - Bạn là ngọn nến trong bóng tối.
    - Bạn là một tấm gương tuyệt vời cho người khác.
    - Ở bên bạn giống như đang trong một kỳ nghỉ nhỏ vui vẻ.
    - Bạn luôn biết phải nói gì.
    - Bạn luôn học hỏi những điều mới và cố gắng hoàn thiện bản thân, điều đó thật tuyệt vời.
    - Sự sáng tạo của bạn có sức lan tỏa.
    - Bạn có một vẻ duyên dáng và thanh lịch tự nhiên.
    - Lòng tốt của bạn là một kho báu đối với tất cả những ai biết bạn.
    - Bạn có một tinh thần làm việc đáng kinh ngạc.
    - Sự tích cực của bạn truyền cảm hứng.
    - Bạn có cách làm cho mọi thứ trở nên tốt đẹp hơn.
    - Bạn dũng cảm hơn bạn tin, và mạnh mẽ hơn bạn tưởng.
    - Bạn là một người giải quyết vấn đề thực thụ, luôn tìm ra lối đi.
    - Nụ cười của bạn có sức lan tỏa.
    - Bạn thắp sáng bất kỳ căn phòng nào bạn bước vào.
    - Năng lượng của bạn thật truyền nhiễm.
    - Bạn có khiếu hài hước tuyệt vời làm bừng sáng một ngày của mọi người.
    - Bạn tuyệt vời về mọi mặt.
    - Bạn có một trái tim thật nhân hậu.
    - Niềm đam mê của bạn với những gì bạn yêu thích thật đáng ngưỡng mộ.
    - Bạn đang tạo ra sự khác biệt trên thế giới.
    - Bạn vui hơn cả bọc bong bóng.
    - Trên thang điểm từ 1 đến 10, bạn là 11.
    - Bạn giống như một làn gió trong lành.
    - Bạn là lý do khiến ai đó mỉm cười.
    - Bạn còn tuyệt hơn cả kỳ lân vì bạn là thật.
    - Làm thế nào bạn có thể luôn hài hước và làm mọi người cười vậy?
    - Bạn có gu rất tốt về [âm nhạc/sách/phim].
    - Khả năng nhớ lại những thông tin ngẫu nhiên vào đúng thời điểm của bạn thật ấn tượng.
    - Bạn luôn học hỏi những điều mới và cố gắng hoàn thiện bản thân, điều đó thật tuyệt vời.
    - Bạn có thể sống sót qua đại dịch zombie.
    - Bạn vui hơn cả một nhà banh chứa đầy kẹo.
    - Bạn là phiên bản hoàn hảo nhất của chính mình.
    - Lòng tốt của bạn là liều thuốc chữa lành cho tất cả những ai gặp bạn.
darkjokes:
  messages:
    - Cho một người que diêm, anh ta sẽ ấm trong vài giờ. Châm lửa một người, anh ta sẽ ấm đến hết đời.
    - Vợ chồng tôi đã đi đến quyết định khó khăn là không muốn có con. Nếu ai muốn, chỉ cần gửi cho tôi thông tin liên lạc của bạn và chúng tôi có thể mang chúng đến vào ngày mai.
    - |-
      Khi nào một câu đùa trở thành một câu đùa của bố?
      Khi nó bỏ đi và không bao giờ quay trở lại.
    - Trẻ mồ côi có được ăn ở nhà hàng gia đình không?
    - |-
      Suzy đã đi đâu sau khi bị lạc trên một bãi mìn?
      KHẮP MỌI NƠI!
    - Khi bạn cán phải một gờ giảm tốc trong khu vực trường học và nhớ ra, ở đây không có gờ giảm tốc nào cả.
    - Người yêu cũ của tôi gần đây gặp tai nạn tồi tệ. Tôi đã nói cho bác sĩ sai nhóm máu. Giờ thì cô ấy sẽ thực sự biết cảm giác bị từ chối là như thế nào.
    - |-
      Bạn có muốn thử đồ ăn châu Phi không??
      Họ cũng vậy.
    - Trẻ con ở ghế sau gây ra tai nạn và tai nạn ở ghế sau tạo ra trẻ con.
    - Bạn làm gì khi đọc xong một tạp chí ở bệnh viện? Nạp lại đạn và tiếp tục bắn.
    - |-
      Làm thế nào để tổ chức một bữa tiệc bất ngờ tại bệnh viện?
      Mang đèn nhấp nháy vào khu điều trị động kinh.
    - Tôi có một con cá có thể nhảy breakdance! Nhưng chỉ trong 20 giây, và chỉ một lần thôi.
    - |-
      Vợ chồng tôi đã đưa ra một lựa chọn khó khăn và quyết định không muốn có con.
      Nếu ai muốn, chỉ cần gửi cho tôi thông tin liên lạc của bạn, và chúng tôi có thể mang chúng đến vào ngày mai.
    - |-
      Tôi muốn ra đi thanh thản trong giấc ngủ, giống như ông nội tôi,
      Chứ không phải la hét như những hành khách trong xe của ông.
    - Tôi đã bắt đầu khóc khi bố đang thái hành. Hành tây là một chú chó ngoan.
    - Bác sĩ cho tôi một năm để sống, nên tôi đã bắn ông ta. Thẩm phán cho tôi 15 năm. Vấn đề đã được giải quyết.
    - |-
      Khi còn nhỏ, chúng ta từng sợ bóng tối.
      Nhưng khi lớn lên, hóa đơn tiền điện làm chúng ta sợ ánh sáng!
    - "Tôi ghét việc đám tang luôn diễn ra lúc 9 giờ sáng. Tôi không thực sự là người thích buổi sáng (mourning person - chơi chữ với mourning: tang lễ)."
    - Tại sao bạn bè lại giống như tuyết? Nếu bạn tè lên họ, họ sẽ biến mất.
    - Bác sĩ trị liệu của tôi nói tôi bị ám ảnh bởi việc trả thù. Chúng ta sẽ xem về điều đó.
    - Điều quan trọng là phải có vốn từ vựng tốt. Nếu tôi biết sự khác biệt giữa 'thuốc giải độc' (antidote) và 'giai thoại' (anecdote), một trong những người bạn tốt của tôi vẫn còn sống.
    - Tại sao bạn không thể nghe thấy một nhà tâm thần học sử dụng phòng tắm? Bởi vì chữ 'P' (pee - đi tiểu) là âm câm.
    - Tôi có một câu chuyện đùa về kinh tế học nhỏ giọt. Nhưng 99% các bạn sẽ không bao giờ hiểu được.
    - Hóa ra một nghiên cứu lớn mới đây cho thấy con người ăn nhiều chuối hơn khỉ. Tôi không thể nhớ lần cuối cùng mình ăn một con khỉ là khi nào.
    - Tôi bảo vợ tôi nên chấp nhận những sai lầm của cô ấy. Cô ấy đã ôm tôi.
    - Vợ tôi để lại một tờ giấy trên tủ lạnh ghi rằng, 'Cái này không hoạt động, tạm biệt.' Tôi mở tủ lạnh ra và nó vẫn hoạt động tốt.
    - Tại sao các nghĩa trang không bao giờ quá đông? Bởi vì mọi người đang chết để được vào trong.
    - Tôi có một cây bút EpiPen. Bạn tôi đã đưa nó cho tôi khi anh ấy đang hấp hối. Dường như đối với anh ấy, việc tôi có nó rất quan trọng.
    - Hôm nay là một ngày tồi tệ. Người yêu cũ của tôi bị xe buýt đâm, và tôi mất việc làm tài xế xe buýt.
    - Tôi đã nói cho nhân viên y tế sai nhóm máu của người yêu cũ, để anh ta biết cảm giác bị từ chối là như thế nào.
    - Người phát minh ra tính năng tự động sửa lỗi đã qua đời hôm nay. Lễ hội của ông ấy sẽ được tổ chức vào Chủ nhật.
    - Tôi không tin rằng bố tôi đang ăn cắp từ công việc cảnh sát giao thông của mình, nhưng khi tôi về nhà, tất cả các biển báo (signs) đều ở đó.
    - Cho một người một que diêm, anh ta sẽ ấm trong vài giờ. Đốt cháy anh ta, và anh ta sẽ ấm đến hết đời.

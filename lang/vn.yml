# TIN NHẮN LỆNH ĐÙA ĐEN
# ===========================================================================
darkjokes:
  messages:
    - "Cho một người que diêm, anh ta sẽ ấm trong vài giờ. Châm lửa một người, anh ta sẽ ấm đến hết đời."
    - "Vợ chồng tôi đã đi đến quyết định khó khăn là không muốn có con. Nếu ai muốn, chỉ cần gửi cho tôi thông tin liên lạc của bạn và chúng tôi có thể mang chúng đến vào ngày mai."
    - "Khi nào một câu đùa trở thành một câu đùa của bố?\nKhi nó bỏ đi và không bao giờ quay trở lại."
    - "Trẻ mồ côi có được ăn ở nhà hàng gia đình không?"
    - "Suzy đã đi đâu sau khi bị lạc trên một bãi mìn?\nKHẮP MỌI NƠI!"
    - "Khi bạn cán phải một gờ giảm tốc trong khu vực trường học và nhớ ra, ở đây không có gờ giảm tốc nào cả."
    - "Người yêu cũ của tôi gần đây gặp tai nạn tồi tệ. Tôi đã nói cho bác sĩ sai nhóm máu. Giờ thì cô ấy sẽ thực sự biết cảm giác bị từ chối là như thế nào."
    - "Bạn có muốn thử đồ ăn châu Phi không??\nHọ cũng vậy."
    - "Trẻ con ở ghế sau gây ra tai nạn và tai nạn ở ghế sau tạo ra trẻ con."
    - "Bạn làm gì khi đọc xong một tạp chí ở bệnh viện? Nạp lại đạn và tiếp tục bắn."
    - "Làm thế nào để tổ chức một bữa tiệc bất ngờ tại bệnh viện?\nMang đèn nhấp nháy vào khu điều trị động kinh."
    - "Tôi có một con cá có thể nhảy breakdance! Nhưng chỉ trong 20 giây, và chỉ một lần thôi."
    - "Vợ chồng tôi đã đưa ra một lựa chọn khó khăn và quyết định không muốn có con.\nNếu ai muốn, chỉ cần gửi cho tôi thông tin liên lạc của bạn, và chúng tôi có thể mang chúng đến vào ngày mai."
    - "Tôi muốn ra đi thanh thản trong giấc ngủ, giống như ông nội tôi,\nChứ không phải la hét như những hành khách trong xe của ông."
    - "Tôi đã bắt đầu khóc khi bố đang thái hành. Hành tây là một chú chó ngoan."
    - "Bác sĩ cho tôi một năm để sống, nên tôi đã bắn ông ta. Thẩm phán cho tôi 15 năm. Vấn đề đã được giải quyết."
    - "Khi còn nhỏ, chúng ta từng sợ bóng tối.\nNhưng khi lớn lên, hóa đơn tiền điện làm chúng ta sợ ánh sáng!"
    - "Tôi ghét việc đám tang luôn diễn ra lúc 9 giờ sáng. Tôi không thực sự là người thích buổi sáng (mourning person - chơi chữ với mourning: tang lễ)."
    - "Tại sao bạn bè lại giống như tuyết? Nếu bạn tè lên họ, họ sẽ biến mất."
    - "Bác sĩ trị liệu của tôi nói tôi bị ám ảnh bởi việc trả thù. Chúng ta sẽ xem về điều đó."
    - "Điều quan trọng là phải có vốn từ vựng tốt. Nếu tôi biết sự khác biệt giữa 'thuốc giải độc' (antidote) và 'giai thoại' (anecdote), một trong những người bạn tốt của tôi vẫn còn sống."
    - "Tại sao bạn không thể nghe thấy một nhà tâm thần học sử dụng phòng tắm? Bởi vì chữ 'P' (pee - đi tiểu) là âm câm."
    - "Tôi có một câu chuyện đùa về kinh tế học nhỏ giọt. Nhưng 99% các bạn sẽ không bao giờ hiểu được."
    - "Hóa ra một nghiên cứu lớn mới đây cho thấy con người ăn nhiều chuối hơn khỉ. Tôi không thể nhớ lần cuối cùng mình ăn một con khỉ là khi nào."
    - "Tôi bảo vợ tôi nên chấp nhận những sai lầm của cô ấy. Cô ấy đã ôm tôi."
    - "Vợ tôi để lại một tờ giấy trên tủ lạnh ghi rằng, 'Cái này không hoạt động, tạm biệt.' Tôi mở tủ lạnh ra và nó vẫn hoạt động tốt."
    - "Tại sao các nghĩa trang không bao giờ quá đông? Bởi vì mọi người đang chết để được vào trong."
    - "Tôi có một cây bút EpiPen. Bạn tôi đã đưa nó cho tôi khi anh ấy đang hấp hối. Dường như đối với anh ấy, việc tôi có nó rất quan trọng."
    - "Hôm nay là một ngày tồi tệ. Người yêu cũ của tôi bị xe buýt đâm, và tôi mất việc làm tài xế xe buýt."
    - "Tôi đã nói cho nhân viên y tế sai nhóm máu của người yêu cũ, để anh ta biết cảm giác bị từ chối là như thế nào."
    - "Người phát minh ra tính năng tự động sửa lỗi đã qua đời hôm nay. Lễ hội của ông ấy sẽ được tổ chức vào Chủ nhật."
    - "Tôi không tin rằng bố tôi đang ăn cắp từ công việc cảnh sát giao thông của mình, nhưng khi tôi về nhà, tất cả các biển báo (signs) đều ở đó."
    - "Cho một người một que diêm, anh ta sẽ ấm trong vài giờ. Đốt cháy anh ta, và anh ta sẽ ấm đến hết đời."


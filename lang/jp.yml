  Storm: 大嵐！危険だが巨大魚のチャンス！
  Thời tiết đẹp, cây phát triển bình thường.: 美しい天気、植物は正常に成長します。
  Mưa giúp cây phát triển nhanh hơn.: 雨は植物の成長を早めます。
  Sương mù dày đặc, độ ẩm cao. Cơ hội đột biến nhỏ.: 濃霧、高湿度。突然変異の小さなチャンス。
  Mưa axit kỳ lạ. Gây đột biến nhẹ cho cây trồng.: 奇妙な酸性雨。植物に軽度の突然変異を引き起こします。
  Nắng gắt, thiếu nước. Cây chậm lớn.: 強い日差し、水不足。植物の成長が遅くなります。
  Sâu bệnh hoành hành. Giảm sản lượng.: 害虫の蔓延。収穫量が減少します。
  Trăng đỏ chiếu sáng. Năng lượng tối kích thích đột biến.: 赤い月が輝く。ダークエネルギーが突然変異を刺激します。
  Cầu vồng đôi xuất hiện! Sản lượng và đột biến tăng nhẹ.: 二重虹が出現！収穫量と突然変異がわずかに増加します。
  Sấm sét kích thích sự biến đổi.: 稲妻が変化を刺激します。
  Sao băng rơi xuống ruộng! Năng lượng vũ trụ gây đột biến mạnh.: 畑に流星が落ちる！宇宙エネルギーが強い突然変異を引き起こします。
  Ánh sáng vàng rực rỡ. Cây phát triển nhanh và có cơ hội đột biến.: 輝く黄金の光。植物は早く成長し、突然変異のチャンスがあります。
  Bão lớn! Nguy hiểm nhưng cơ hội đột biến rất cao.: 大嵐！危険ですが、突然変異のチャンスが非常に高いです。
  Nhật thực toàn phần! Bóng tối kích hoạt đột biến cực mạnh.: 皆既日食！暗闇が極端な突然変異を活性化します。
  Năng lượng ma thuật bao trùm. Mọi thứ đều biến đổi.: 魔法のエネルギーが包む。すべてが変化します。
  Cực quang thần bí. Đột biến hiếm có cơ hội cao nhất.: 神秘的なオーロラ。希少な突然変異の最も高いチャンス。
  Nhỏ bé nhưng dễ thương.: 小さいけど可愛い。
  To lớn vượt trội.: ずば抜けて大きい。
  Màu sắc rực rỡ.: 鮮やかな色。
  Tươi tốt lạ thường.: 異常に青々としている。
